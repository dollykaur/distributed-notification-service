spring.application.name=notification-api

# Server
server.port=8080

# Postgres
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/notifications}
spring.datasource.username=${DB_USERNAME:notif_user}
spring.datasource.password=${DB_PASSWORD:notif_pass}

# Hibernate / JPA settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

#This is to override the time-zone with default "Asia/Calcutta" because postgres understood "Asia/Kolkata"
spring.jackson.time-zone=Asia/Kolkata

